<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Squircle Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="#1f1f23" stroke-width="4" />
  
  <!-- Glowing Background Accent Ring -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="url(#pGrad)" stroke-width="2" opacity="0.4" />

  <!-- Elegant Letter 'P' Geometry -->
  <g filter="url(#glow)">
    <!-- Main stem -->
    <rect x="160" y="120" width="44" height="272" rx="12" fill="url(#pGrad)" />
    <!-- Loop of P -->
    <path d="M160 120 H250 C305 120 350 165 350 220 C350 275 305 320 250 320 H160 V120 Z" fill="none" stroke="url(#pGrad)" stroke-width="44" stroke-linejoin="round" stroke-linecap="round" />
  </g>
  
  <!-- Sleek dot element inside Loop -->
  <circle cx="250" cy="220" r="14" fill="#ffffff" opacity="0.9" />
</svg>
